<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QoS Registry Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo-area">
                <div class="status-indicator live"></div>
                <h1>QoS Registry <span class="highlight">Smart Edge</span></h1>
            </div>
            <p class="subtitle">Real-time Node Load Distribution & Analytics</p>
        </header>

        <main id="node-grid" class="node-grid">
            <!-- Node cards will be injected here via app.js -->
            <div class="loading">Waiting for active nodes...</div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
